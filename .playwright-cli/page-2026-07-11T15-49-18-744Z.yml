          - generic [ref=e226]:
            - generic [ref=e227]:
              - generic [ref=e228]:
                - text: 近年来，心血管疾病、糖尿病、部分癌症等慢性非传染性疾病（“慢性病”）导致的死亡人数占中国居民总死亡人数的近90%，已成为中国乃至全球性的重大公共卫生问题，而超重和肥胖是慢性病的主要危险因素
                - superscript [ref=e229]:
                  - text: ［
                  - link "1" [ref=e230] [cursor=pointer]:
                    - /url: "#R1"
                  - text: ］
                - text: 。当前，中国50%以上的成年人和约20%的学龄儿童超重或肥胖，在部分城市中，儿童青少年超重、肥胖率已达40%
                - superscript [ref=e231]:
                  - text: ［
                  - link "2" [ref=e232] [cursor=pointer]:
                    - /url: "#R2"
                  - text: ］
                - text: 。在过去的20年间，中国超重率、肥胖率，以及相关慢性病的患病率迅速攀升
                - superscript [ref=e233]:
                  - text: ［
                  - link "3" [ref=e234] [cursor=pointer]:
                    - /url: "#R3"
                  - text: ］
                - text: 。随着社会经济的发展、人们生活水平的不断提高，生活方式也发生了重大变化，肥胖问题愈加凸显。自2000年以来，世界卫生组织（World Health Organization，WHO）呼吁各国采取有力措施遏制肥胖率的上升，尤其倡导要以儿童肥胖防控为着力点。中国制定和实施了一系列与肥胖防控相关的政策和策略，但肥胖及相关慢性病的问题尚未得到有效控制。
              - generic [ref=e235]: 肥胖的科学有效防治对实现“健康中国2030”的目标至关重要。体重管理、肥胖预防和治疗工作亟需从多方位、多层次的政策、经济、环境、社会和行为因素等方面，采取多方位、多层次的综合措施。中国现有的肥胖防控相关的共识及指南大多仅针对超重/肥胖人群的治疗，对健康人群的体重管理和肥胖预防重视不够，未做到全人群、全方位、全生命周期覆盖，对肥胖防控应采取的综合措施也未达成全面共识。另外，近年来国际上涌现出诸多关于肥胖的研究，中国现有的共识和指南尚未全面纳入最新研究成果。
              - generic [ref=e236]:
                - text: 为推动全人群、全方位、全生命周期体重管理及肥胖防治工作，结合中国已经发布的相关指南及专家共识，包括2019年发布的《中国肥胖预防和控制蓝皮书》、中国营养学会肥胖防控分会2021年发布的《中国肥胖防控倡议书》、中国营养学会临床营养分会等机构2021年发布的《中国超重/肥胖医学营养治疗指南（2021）》、2021年中国专家在
                - emphasis [ref=e237]: The Lancet Diabetes & Endocrinology
                - text: 中发表的中国肥胖问题系列文章以及国内外其他最新的相关研究成果，并参考《WHO指南编写手册》等，根据循证医学规范，制定了《中国居民肥胖防治专家共识》（《专家共识》），旨在为中国肥胖防控工作提供科学、规范、易实施的操作技术、方法和流程，促进全社会参与，助力“健康中国2030”规划落实。
              - generic [ref=e238]:
                - text: 《专家共识》包括7章，分别对中国的肥胖流行状况、主要影响因素及挑战、筛查与诊断、全生命周期预防与控制、临床治疗管理、全社会参与综合防控策略进行总结并提出建议。见
