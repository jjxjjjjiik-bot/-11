      - generic [ref=e331]:
        - generic [ref=e334]:
          - generic [ref=e335]: 附录
          - generic [ref=e339]:
            - generic [ref=e340]: 附录1《中国居民肥胖防治专家共识》制定方法
            - paragraph [ref=e341]: （1）文献检索及相关资料收集：编写过程中，检索了自2000年以来发表的相关专家共识、指南和其他重要文献，确定二级和一级数据库。部分共识内容，例如关于肥胖防治部分，是根据国际证据分级与推荐（GRADE）强度分级，具有较好的可操作性。
            - paragraph [ref=e342]: （2）专家咨询、访谈及研讨会：采用个人访谈、小组访谈及专家讨论会等多种形式，组织来自肥胖相关领域，例如，循证医学、公共卫生、临床医学、营养学、运动科学等领域的30余位权威专家，组成了多个工作组，例如，领导小组、文献查询组、临床组、运动组和审核组等，就共识内容进行了多次研讨，广泛深入地开展讨论，修订文稿，最终形成《专家共识》。
          - generic [ref=e346]:
            - generic [ref=e347]: 附录2《中国居民肥胖防治专家共识》旨在回答的主要问题
            - paragraph [ref=e348]: （1）为什么肥胖防控很重要（肥胖的危害，中国肥胖疾病负担和未来趋势，为什么要编撰该专家共识）？
            - paragraph [ref=e349]: （2）如何诊断超重和肥胖？
            - paragraph [ref=e350]: （3）中国肥胖的主要影响因素及肥胖防控的主要挑战是什么？
            - paragraph [ref=e351]: （4）怎样预防肥胖？
            - paragraph [ref=e352]: （5）怎样治疗肥胖？
            - paragraph [ref=e353]: （6）哪些人和机构需要参与肥胖防控及如何开展工作？
          - generic [ref=e357]:
            - generic [ref=e358]: 附录3 肥胖防控及有效政策措施的重要性
            - paragraph [ref=e359]: （1）肥胖和相关慢性病已成为危害全球及中国民众健康的重大公共卫生问题。肥胖增加很多慢性病的风险，给个人、家庭和社会带来沉重负担。
            - paragraph [ref=e360]: （2）近30年来，全世界范围超重/肥胖率呈现快速上升趋势。约40%的成年人和20%的儿童青少年超重或肥胖。中国是世界上超重和肥胖人数最多的国家，超过50%的成人和近20%的学龄儿童青少年超重或肥胖。肥胖防控是中国亟待解决的重大公共卫生问题。
            - paragraph [ref=e361]: （3）研究预测，到2030年，中国成人中超重和肥胖患病率可能将达到65.3%，在儿童青少年（7~17岁）中将达到31.8%，在学龄前儿童（≤6岁）中将达到15.6%（WHO标准）。
            - paragraph [ref=e362]: （4）研究预测，到2030年，中国归因于超重/肥胖的医疗费用保守估计将达4 180亿元人民币，约占全国医疗费用总额的21.5%。
            - paragraph [ref=e363]: （5）世界卫生组织号召世界各国采取有力措施控制肥胖患病率上升，尤其要以儿童肥胖防控为着力点。
            - paragraph [ref=e364]: （6）超重/肥胖率的增长如果不能有效遏制，将极大危害中国人民的健康水平，影响“健康中国2030”目标的实现。
          - generic [ref=e368]:
            - generic [ref=e369]: 附录4 全生命周期肥胖预防措施
            - paragraph [ref=e370]: （1）婴幼儿童：①坚持母乳喂养，尽早开奶，按需哺乳，直接喂养，纯母乳喂养满6个月，在添加辅食同时母乳喂养持续到2岁。②适时适量添加辅食，提倡顺应性喂养。③保证足够时间和强度的身体活动，增强肌肉和骨骼健康的锻炼。④保持每天规律、充足睡眠，达到至少11小时高质量睡眠。
            - paragraph [ref=e371]: （2）学龄儿童青少年：①按时、规律进餐，避免不吃早餐和白天不断加餐，三餐达到蛋白质、碳水化合物和脂肪摄入均衡，进食速度不宜过快。②避免含糖饮料，避免高能量、高脂肪或高钠加工食品，控制能量高的油炸食物及零食，禁止饮酒。③多吃蔬菜和水果，增加膳食纤维摄入。④保证足够时间和强度的身体活动，减少静坐和电子产品屏幕暴露时间。⑤培养健康的睡眠方式，保持充足、规律睡眠时间。⑥定期监测体质健康指标，卫生服务人员积极筛查儿童肥胖及相关危险因素，及早进行肥胖干预。⑦积极开展针对儿童青少年、其父母和学校相关人员的合理膳食和身体活动教育，鼓励学校提供健康饮食知识教育。⑧强化中小学每年的学生体检工作，包括质量控制和及时通知学生和家长体检结果（包括身高、体重、BMI和是否超重或者肥胖）。⑨家长要树立健康生活方式典范，营造良好家庭运动氛围，帮助儿童养成健康生活方式和习惯。⑩对含糖饮料采取有效增加税收政策，添加食品包装的营养标签。11禁止广告和媒体向儿童宣传不健康食品和饮料。12关注贫困地区儿童和青少年的营养状况，尤其是留守儿童。
            - paragraph [ref=e372]: （3）成年人：①合理膳食，吃动平衡。②少油少盐控糖，戒烟戒酒。③减少食用快餐食品，减少在外就餐及外卖点餐。④每周保证足够身体活动时间，避免熬夜和久坐。⑤积极开展健康教育，建设公共运动设施和场地、健身步道。在工作场所提倡利用碎片化时间进行锻炼，减少久坐。⑥定期体重自测和健康检查，做好体重管理。
            - paragraph [ref=e373]: （4）老年人：①控制总能量摄入，少量多次用餐。②多吃蔬菜、水果、杂粮等食物。③控制脂肪摄入，多吃鱼肉等高蛋白低脂肪的食物，避免摄入过多动物脂肪。④多饮水，戒烟戒酒，适量补充营养素。⑤选择适宜的运动方式，坚持规律、适量运动。（5）孕前、孕期妇女：①定期监测孕期体重变化，根据孕前BMI维持孕期适宜体重。②孕期平衡膳食，控制总能量摄入，进行适宜的身体活动。③规范妊娠期糖尿病和妊娠期高血压的诊断和管理，早发现早治疗。④避免接触烟草、酒精、麻醉品和有毒物质。⑤倡导自然分娩，控制选择性剖宫产率。
            - paragraph [ref=e374]: （6）哺乳期妇女:①倡导坚持母乳喂养。②少食多餐，多吃低能量的食物，保障充足蛋白质和维生素的摄入。③保证规律作息时间和充足的睡眠。
          - generic [ref=e378]:
            - generic [ref=e379]:
              - text: 附录5 儿童青少年肥胖防控的“52110”日常行动建议
              - superscript [ref=e380]:
                - text: ［
                - link "32" [ref=e381] [cursor=pointer]:
                  - /url: "#R32"
                - text: ］
            - paragraph [ref=e382]: 5：每天吃5个成年人拳头大小的蔬菜和水果。
            - paragraph [ref=e383]: 2：每天使用电脑玩游戏、看电视、玩手机等静态活动时间（不包括上课时间）不超过2小时。
            - paragraph [ref=e384]: 1：每天进行1小时以上中、高强度身体活动。
            - paragraph [ref=e385]: 1：每天吃肉不超过1份（1个普通成年人手掌心大小）。
            - paragraph [ref=e386]: 0：不喝含糖饮料。
          - generic [ref=e390]:
            - generic [ref=e391]:
              - text: 附录6 健康体重管理及肥胖防控的膳食建议
              - superscript [ref=e392]:
                - text: ［
                - link "50" [ref=e393] [cursor=pointer]:
                  - /url: "#R50"
                - text: ","
                - link "51" [ref=e394] [cursor=pointer]:
                  - /url: "#R51"
                - text: ","
                - link "52" [ref=e395] [cursor=pointer]:
                  - /url: "#R52"
                - text: ］
            - paragraph [ref=e396]: （1）保证膳食能量来源和营养素充足，三餐合理。
            - paragraph [ref=e397]: • 碳水化合物、蛋白质、脂肪比例、微量营养素摄入量保持在合理水平。
            - paragraph [ref=e398]: • 食不过量，达到能量平衡或负平衡，维持健康体重。
            - paragraph [ref=e399]: （2）保持以植物性食物为主的平衡膳食结构
            - paragraph [ref=e400]: • 增加全谷物消费，减少精白米面摄入。
            - paragraph [ref=e401]: • 在保证充足蔬菜摄入的前提下，增加深色蔬菜摄入。
            - paragraph [ref=e402]: • 增加富含优质蛋白质的豆类及其制品摄入。
            - paragraph [ref=e403]: • 增加新鲜水果摄入。
            - paragraph [ref=e404]: （3）优化动物性食物消费结构
            - paragraph [ref=e405]: • 改变较为单一的、以猪肉为主的消费结构。
            - paragraph [ref=e406]: • 增加富含不饱和脂肪酸的水产品类、低脂或脱脂奶类及其制品的摄入。
            - paragraph [ref=e407]: • 适量摄入蛋类及其制品。
            - paragraph [ref=e408]: （4）控制油、盐、糖和酒精等摄入
            - paragraph [ref=e409]: • 成人每天食盐不超过5 g，烹饪油不超过25~30 g，添加糖摄入不超过50 g，最好控制在25 g以下。
            - paragraph [ref=e410]: • 戒烟戒酒。
            - paragraph [ref=e411]: • 少吃高盐和油炸食品，减少含糖饮料，鼓励足量饮水。
          - generic [ref=e415]:
            - generic [ref=e416]: 附录7 中国肥胖防治行动建议15条（2022年）
            - paragraph [ref=e417]: 面向全社会，包括政府、医疗卫生机构、学校、家庭和个人、各类工作场所等提出以下5方面的15条肥胖防治行动建议：
            - paragraph [ref=e418]: 一、动员全社会参与，倡导健康生活方式。
            - paragraph [ref=e419]: 1. 明确各方责任，倡导支持健康生活方式，全社会参与肥胖防控工作。各级政府、机构均应出台肥胖防控支持性政策，加大政策倡导力度。建立多部门跨领域的肥胖防控合作机制，由政府主导，医疗卫生机构、学校、各类工作场所、媒体、产业界、研究机构、家庭和个人共同参与，推动多部门跨领域行动。
            - paragraph [ref=e420]: 2. 加强公众健康教育，普及健康体重相关知识，提高全民健康素养。利用学校、企事业单位、社区和媒体加强对儿童、成人居民、专业机构工作人员及食品生产经营者的健康教育，提高全民对肥胖危害、影响因素及防治措施的知晓程度。
            - paragraph [ref=e421]: 3. 吃动两平衡，定期测量体重及腰围，保持健康体重。学习中国居民膳食指南和营养知识。利用创新科普宣传方式，促进居民增强健康生活方式的形成，提高体重管理的知识技能。
            - paragraph [ref=e422]: 二、创建健康支持环境，促进全民健康膳食。
            - paragraph [ref=e423]: 4. 完善政策体系，创建健康食物消费环境。推进完善相关法律法规，对含糖饮料采取有效的税收政策，强化食物营销管理，禁止不科学、不健康的食品广告，全面推行营养标签制度、健康食堂和健康餐厅，提升健康食品的可及性。
            - paragraph [ref=e424]: 5. 改善膳食结构，养成科学饮食行为。保证食物多样化，营养素摄入充足。增加全谷物、深色蔬菜和新鲜水果消费，增加豆类及其制品、低脂奶类及其制品、水产品类摄入。减少煎、炸等烹调方式，控制油、盐、糖摄入。少喝含糖饮料，减少外出就餐。食不过量，达到能量平衡。
            - paragraph [ref=e425]: 三、营造全民健身氛围，加强身体活动。
            - paragraph [ref=e426]: 6. 完善公共体育设施，营造全民健身氛围。加强社区、学校、工作场所等的健身场所建设和利用率，增加健身步道、骑行道、体育公园和多功能运动场地的建设，营造良好的全民健身氛围。
            - paragraph [ref=e427]: 7. 增加日常身体活动，积极参加体育锻炼，减少久坐行为。倡导各年龄段人群每天运动，遵循循序渐进原则，每天1万步或每周进行至少150 min的中或高等强度有氧运动和户外活动等。减少静态行为，特别是屏幕前的持续久坐行为。
            - paragraph [ref=e428]: 四、开展全生命周期肥胖防治，关注重点人群。
            - paragraph [ref=e429]: 8. 关注生命早期1 000天，促进生命早期膳食营养和身体活动。加强对孕前和孕期健康指导，改善准父母的健康饮食和身体活动，避免接触烟草、酒精、麻醉品和有毒物质。促进孕前及孕期维持适宜体重。规范妊娠期糖尿病和高血压的诊断和管理，早发现早治疗。提供支持母乳喂养的环境和政策，鼓励6个月纯母乳喂养，适时适量添加辅食。定期评价婴幼儿生长发育状况。
            - paragraph [ref=e430]: 9. 促进儿童青少年的膳食营养和身体活动。开设健康教育课程，帮助儿童养成健康的饮食行为。保障幼儿园和学校健康餐厅建设和健康食物及安全饮用水的供给，避免提供高糖、高盐和高脂等食物。积极引导儿童进行户外活动和体育锻炼，保持充足规律的睡眠时间。做好儿童青少年体重和生长发育监测。关注肥胖儿童的心理健康。
            - paragraph [ref=e431]: 10. 促进老年人群膳食营养和身体活动。维持能量摄入与消耗的平衡，以优质蛋白质为主，避免脂肪过量摄入，荤素合理搭配，维持健康体重。选择适宜强度的运动方式，多做户外活动，坚持每天进行适量身体活动。
            - paragraph [ref=e432]: 五、优化健康体重管理，完善肥胖防控服务体系。
            - paragraph [ref=e433]: 11. 规范肥胖综合诊治，提供个性化服务。制定适用于医疗卫生服务机构的肥胖诊疗技术指南，鼓励医院开展肥胖危险因素筛查与干预，规范营养、运动、药物和手术治疗，加强精神-心理支持，实现精准化治疗。
            - paragraph [ref=e434]: 12. 将肥胖防治纳入基本公共卫生服务项目。将体重管理和肥胖防控作为基层卫生服务机构工作职能，使临床治疗、社区干预及自我体重管理有效衔接。将肥胖的评估和干预纳入家庭医生签约服务内容，并配备专门人员提供体重管理服务。
            - paragraph [ref=e435]: 13. 建立和完善全生命周期体重管理监测体系。结合智慧医疗、可穿戴设备等现代信息技术，加强对全生命周期体重管理的监测评估，完善肥胖筛查、预警、干预流程及服务实施体系。
            - paragraph [ref=e436]: 14. 加强肥胖防控人才培养，扩大专业服务队伍。完善肥胖防控人才培养体系，培育建设专业人才队伍，为医护人员、中小学和幼儿教师提供继续教育培训，帮助提升肥胖防控能力。
            - paragraph [ref=e437]: 15. 加强相关科学研究与国际交流。大力支持推动跨学科、多层面、依托新科技和大数据的肥胖防控系统研究，加强肥胖环境危险因素及防治有效实施措施的研究，推动肥胖监测、管理及评价体系包括国家和地方相关政策法规的完善，开展基于幼儿园、学校、工作场所、公共场所等的干预行动。加强国际交流合作。
          - generic [ref=e441]:
            - generic [ref=e442]:
              - text: 附录8 促进中国居民健康体重管理和肥胖防控工作的针对主要相关机构和个人的行动建议
              - superscript [ref=e443]:
                - text: ［
                - link "2" [ref=e444] [cursor=pointer]:
                  - /url: "#R2"
                - text: ］
            - paragraph [ref=e445]: （1）政府机构：①强化政府责任，将肥胖防控工作纳入政府工作计划。②推动农业、食品工业、运动产业、商业、研究、社区等多层次、跨领域肥胖防控合作机制，明确各方职责。③推进相关政策法规的制定、完善、实施和评估，例如《广告法》等。④加强支持性环境建设，如：建设健康人行道、自行车道、公共体育场所等基础设施，完善城市规划，鼓励使用公共交通工具。⑤促进母乳喂养支持性环境建设，推动全面落实产假制度，鼓励有条件的公共场所和工作单位建立母婴室。⑥制定并完善相关部门规章制度，对高糖、高脂、高盐食品要加强食品标签管理。⑦改革医疗保险政策，保障肥胖防治。⑧加强对居民体重管理和肥胖防治的监测和监管。
            - paragraph [ref=e446]: （2）个人和家庭：①养成健康的生活方式，注重平衡膳食和适量运动。②保持健康体重。③提高营养健康素养，养成科学饮食行为。④保证食物多样化，减少煎、炸等烹调方式。⑤控制油、盐、糖的使用量，减少在外就餐。⑥营造良好的家庭运动氛围，培养积极的身体活动习惯。⑦充分认识超重/肥胖的危害，做好体重及儿童青少年生长发育监测。
            - paragraph [ref=e447]: （3）新闻媒体：①加强公众对肥胖带来的健康风险的认识。②使用多种形式的传媒载体，广泛宣传中国居民膳食指南、身体活动指南、肥胖预防与控制指南等健康相关知识。③向全社会普及科学的运动、营养、体重管理及良好的生活方式等健康理念，促进健康中国实现。④强化食物营销管理，规范母乳代用品广告宣传，限制含大量糖、反式脂肪酸、饱和脂肪酸等不健康食品的宣传。不鼓励针对儿童的营销，如：食品包装中使用吸引儿童的图片、描述和外形设计。
            - paragraph [ref=e448]: （4）卫生服务机构：①在全生命周期及健康管理过程中，开展肥胖综合诊治，提供个性化服务。②制定标准化肥胖医疗卫生服务指南，鼓励医院开展体重管理诊疗，规范营养、运动和手术治疗。③融合临床和公共卫生服务，将体重管理纳入社区卫生服务中心工作职能，促进肥胖患者临床治疗、社区及自我体重管理有效衔接。④将肥胖的评估和干预纳入家庭医生和地方疾控中心系统服务项目中。⑤将肥胖治疗纳入健康保险范围，并将肥胖患者的医疗报销比例与其体重管理结果相关联。⑥要求社区、地区和区域各级医院和医疗中心设置专项和专人以提供体重管理服务。⑦将现代科学技术如智慧医疗、可穿戴设备运用到体重管理和肥胖诊治中。
            - paragraph [ref=e449]: （5）学校：①将膳食营养和身体活动等健康教育知识融入幼儿园、中小学的常规教育中，从小培养学生健康意识，提升健康素养。②在国家和地方各级教师培训中，增加青少年膳食营养和身体活动等相关知识内容，提高教师专业素养和健康教育指导能力。③制定和修订幼儿园、中小学供餐指南，培训学校和供餐单位餐饮从业人员，改善学校食物供给。④发挥营养午餐的作用，优化学生餐膳食结构，改善烹调方式，保证新鲜蔬菜水果、粗杂粮及适量鱼禽肉蛋奶等供应。⑤禁止在学校内出售零食和含糖饮料，避免提供高糖、高脂、高盐等食物。⑥按规定提供充足的符合国家标准的饮用水。⑦强化体育课和课外锻炼，保证学生充足的身体活动时间。⑧学校医务室按规定配备卫生专业技术人员和设施。
            - paragraph [ref=e450]: （6）社区：①加强社区支持，对家庭、社区食堂和餐饮单位开展膳食营养和身体活动的咨询和指导。②加强建设社区活动场所、健身步道、骑行道、体育公园和多功能运动场地的建设。③发放宣传资料，组织科普讲座，提高居民的实践操作能力，践行健康生活方式。
            - paragraph [ref=e451]: （7）学术机构：①完善肥胖防控人才培养体系，培育建设专业人才队伍。②为医护人员、中小学和幼儿教师提供继续教育培训，提升肥胖防控能力。③积极开展跨学科研究，推进肥胖防控政策研究和干预应用研究。④加强国际交流合作。
            - paragraph [ref=e452]: （8）企业：①支持食品行业生产健康食品，禁止供应高糖、高脂食品，改进油、盐、糖产品的包装标签。②创建营养食堂，提供健身设施，为员工提供定期开展健康检查、咨询和科普。
          - generic [ref=e456]:
            - generic [ref=e457]:
              - text: 附录9《中国肥胖防控倡议书》（2021年，西安）
              - superscript [ref=e458]:
                - text: ［
                - link "53" [ref=e459] [cursor=pointer]:
                  - /url: "#R53"
                - text: ］
            - paragraph [ref=e460]: 肥胖和相关慢性病是危害全球健康的重大公共卫生问题，近40%的成年人和20%的儿童青少年超重和肥胖。中国是世界上超重和肥胖人数最多的国家，超过50%的成年人和近20%的儿童青少年超重和肥胖。预防控制肥胖，减少肥胖的健康危害，已经迫在眉睫。
            - paragraph [ref=e461]: 肥胖防控工作将有利于很多慢性病的防控。合理膳食和适量运动是肥胖防控的重要手段。根据2030联合国可持续发展目标、《健康中国2030规划纲要》和《中国肥胖预防与控制蓝皮书》，在中国营养学会肥胖防控分会成立之际，在古“丝绸之路”和“一带一路”的起点城市——西安，我们发布《中国肥胖防控倡议书》。向全社会，包括政府、医疗卫生机构、学校、各类工作场所、媒体、产业界、研究机构、家庭和个人，我们发出十点呼吁：
            - paragraph [ref=e462]: 1. 动员全社会：各级党委政府动员全社会，特别是宣传、广电、发改、财政、市场监督、卫生健康、教育、体育、药品监督、城建等部门，加强对肥胖及其危险因素的管理，引起全社会对肥胖问题的重视，遏制肥胖和相关慢性病增长。
            - paragraph [ref=e463]: 2. 推动多部门跨领域行动：强化政府责任，将肥胖防控列入政府工作计划；推动多层次、跨领域肥胖防控合作；引导农业、食品工业、运动产业、商业、科学研究、社区建设积极适应肥胖防控需求，促进政产学研一体化。
            - paragraph [ref=e464]: 3. 改善致肥胖环境：改善导致肥胖的食品饮料环境、身体活动环境、社会环境、信息网络环境和文化环境，创造安全、健康和支持性的社区、学校和家庭环境，促进全人群全生命周期健康。
            - paragraph [ref=e465]: 4. 倡导健康生活方式：个人、家庭、社区、学校、单位、专业机构共同努力，全面预防和控制肥胖及相关慢性病。加强对儿童、成人、机构工作人员及食品生产经营者的健康教育。向全社会普及科学、正确的健康、营养、健康体重理念和生活方式，帮助民众合理膳食、适量运动，实施健康体重管理。
            - paragraph [ref=e466]: 5. 推动儿童肥胖防控：学校引进专业师资，开设健康教育课程；社会舆论引导教育儿童及其家庭合理膳食、科学运动；家长给儿童树立健康生活的榜样，引导儿童吃动平衡；以儿童肥胖为着力点，推进全民肥胖防控。
            - paragraph [ref=e467]: 6. 规范肥胖诊治：在全生命周期及健康管理过程，开展肥胖综合诊治，提供个性化服务；制定标准化医疗卫生服务指南，规范实践；融合临床和公共卫生服务，促进肥胖患者临床治疗、社区及自我体重管理有效衔接；改革医疗保险政策，保障肥胖防治。
            - paragraph [ref=e468]: 7. 加强肥胖防控人才培养：完善肥胖防控人才培养体系，培育建设专业人才队伍。学术机构为医护人员、中小学和幼儿教师提供继续教育培训，帮助提升肥胖防控能力。
            - paragraph [ref=e469]: 8. 完善政策体系和评价机制：推进相关政策法规的制定、完善、实施和评估，例如制定完善实施《食育法》、《营养师法》、《广告法》等。加强对相关部门开展肥胖防控工作的指导和工作效果的评价。
            - paragraph [ref=e470]: 9. 开展跨学科研究：大力支持跨学科、多层面、依托大数据的肥胖防控系统研究；开展推广基于学校及工作场所的有效干预项目；加强肥胖环境危险因素研究；推动肥胖监测、管理及评价体系的完善；加强结果和影响评价研究；支持推进政策研究和干预应用研究；推动研究成果落地。
            - paragraph [ref=e471]: 10. 加强国际交流合作：政府、学界、社会团体各领域积极推进国际交流合作，深化与“一带一路”沿线国家的交流与合作；学习其他国家肥胖防控经验，传播分享中国智慧和成功模式，贡献中国力量。
            - paragraph [ref=e472]: 健康是个人发展和家庭幸福的基础，是民族昌盛和国家富强的重要标志。让我们共同努力，积极防控超重/肥胖，为全民健康和建设“健康中国”贡献力量！
